table: employees
description: >
  Core entity table. Stores one record per employee with personal and employment
  identity information. All other tables reference this table via emp_no.
  No department or salary information is stored here directly — those are in
  dept_emp and salaries respectively.

primary_key: [emp_no]

columns:
  - name: emp_no
    type: INT
    nullable: false
    description: Unique employee identifier. Acts as the primary key and foreign key target for all other tables.
    example_value: "10001"

  - name: birth_date
    type: DATE
    nullable: false
    description: Employee's date of birth in YYYY-MM-DD format.
    example_value: "1953-09-02"

  - name: first_name
    type: VARCHAR(14)
    nullable: false
    description: Employee's first name. Max 14 characters.
    example_value: "Georgi"

  - name: last_name
    type: VARCHAR(16)
    nullable: false
    description: Employee's last name. Max 16 characters.
    example_value: "Facello"

  - name: gender
    type: ENUM('M','F')
    nullable: false
    description: Employee gender. Only two values allowed — 'M' (Male) or 'F' (Female).
    example_value: "M"

  - name: hire_date
    type: DATE
    nullable: false
    description: Date the employee was hired. Used to compute tenure and filter active periods.
    example_value: "1986-06-26"

indexes:
  - name: PRIMARY
    columns: [emp_no]
    unique: true
    note: Auto-created by PRIMARY KEY declaration. Used for all foreign key lookups.

foreign_keys: []

relationships:
  - table: dept_emp
    join_type: ONE-TO-MANY
    via: emp_no
    note: One employee can belong to multiple departments over time.

  - table: dept_manager
    join_type: ONE-TO-MANY
    via: emp_no
    note: An employee may have managed one or more departments over time.

  - table: titles
    join_type: ONE-TO-MANY
    via: emp_no
    note: One employee can hold multiple titles sequentially or concurrently.

  - table: salaries
    join_type: ONE-TO-MANY
    via: emp_no
    note: One employee has multiple salary records reflecting pay changes over time.

row_count_approx: 300024
time_range: "hire_date ranges roughly 1985–2000"

notes:
  business_rules:
    - emp_no is NOT AUTO_INCREMENT in the original DDL; values are pre-assigned integers.
    - gender is restricted to ENUM('M','F') — no NULL or other values allowed.
    - No direct department or title column exists; always join to dept_emp or titles.
    - An employee's current department is the dept_emp record where to_date = '9999-01-01'.
    - An employee's current title is the titles record where to_date IS NULL or = '9999-01-01'.

  query_tips:
    - To get current employees only, filter by hire_date and join dept_emp on to_date = '9999-01-01'.
    - Use emp_no in WHERE clauses — it is indexed and far faster than name-based searches.
    - first_name and last_name are NOT indexed by default; add indexes if doing name searches frequently.
    - Full name can be constructed as CONCAT(first_name, ' ', last_name).

  common_joins:
    - description: Get all employees with their current department name
      sql: |
        SELECT e.emp_no, e.first_name, e.last_name, d.dept_name
        FROM employees e
        JOIN dept_emp de ON e.emp_no = de.emp_no AND de.to_date = '9999-01-01'
        JOIN departments d ON de.dept_no = d.dept_no;

    - description: Get all employees with their current salary
      sql: |
        SELECT e.emp_no, e.first_name, e.last_name, s.salary
        FROM employees e
        JOIN salaries s ON e.emp_no = s.emp_no AND s.to_date = '9999-01-01';

    - description: Get all employees with their current title
      sql: |
        SELECT e.emp_no, e.first_name, e.last_name, t.title
        FROM employees e
        JOIN titles t ON e.emp_no = t.emp_no AND t.to_date = '9999-01-01';